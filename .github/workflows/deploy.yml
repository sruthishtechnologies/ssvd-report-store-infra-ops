name: Deploy AWS App Runner

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_app_runner:
        description: "Create/update App Runner service. Use false for first foundation-only deploy."
        required: false
        default: "true"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
  TF_WORKING_DIR: terraform

jobs:
  deploy:
    name: Deploy App Runner infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        if: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ssvd-report-store/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Apply foundation resources
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file=prod.tfvars \
            -var="create_apprunner_service=false"

      - name: Show desired app image tag
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat image.auto.tfvars

      - name: Apply App Runner service
        if: ${{ inputs.deploy_app_runner != 'false' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply -auto-approve \
            -var-file=prod.tfvars \
            -var="create_apprunner_service=true"

      - name: Deployment output
        if: ${{ inputs.deploy_app_runner != 'false' }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output app_url
