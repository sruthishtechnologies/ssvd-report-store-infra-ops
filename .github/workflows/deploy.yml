name: Deploy AWS EC2 Docker

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_container:
        description: "Deploy the Docker image after Terraform apply."
        required: false
        default: "false"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
  TF_WORKING_DIR: terraform

jobs:
  deploy:
    name: Deploy EC2 infrastructure and app container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        if: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=ssvd-report-store/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -var-file=prod.tfvars

      - name: Read deployment outputs
        id: deploy
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          IMAGE_TAG="$(sed -n 's/^image_tag[[:space:]]*=[[:space:]]*"\(.*\)"/\1/p' image.auto.tfvars)"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "app_url=$(terraform output -raw app_url)" >> "$GITHUB_OUTPUT"

      - name: Wait for EC2 SSM readiness
        if: ${{ inputs.deploy_container == 'true' || (github.event_name == 'push' && steps.deploy.outputs.image_tag != 'latest') }}
        run: |
          for attempt in {1..30}; do
            STATUS="$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.deploy.outputs.instance_id }}" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text || true)"
            if [ "$STATUS" = "Online" ]; then
              exit 0
            fi
            echo "Waiting for SSM agent, current status: ${STATUS}"
            sleep 10
          done
          echo "EC2 instance did not become SSM Online in time"
          exit 1

      - name: Deploy container over SSM
        if: ${{ inputs.deploy_container == 'true' || (github.event_name == 'push' && steps.deploy.outputs.image_tag != 'latest') }}
        run: |
          IMAGE="${{ steps.deploy.outputs.ecr_repository_url }}:${{ steps.deploy.outputs.image_tag }}"
          REGISTRY="${{ steps.deploy.outputs.ecr_repository_url }}"
          REGISTRY="${REGISTRY%%/*}"

          cat >ssm-deploy.json <<JSON
          {
            "commands": [
              "set -euxo pipefail",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${REGISTRY}",
              "docker pull ${IMAGE}",
              "docker rm -f ssvd-report-store || true",
              "docker run -d --name ssvd-report-store --restart unless-stopped -p 80:3000 -e NODE_ENV=production -e HOST=0.0.0.0 -e PORT=3000 -e STORAGE_MODE=aws -e AWS_REGION=${{ env.AWS_REGION }} -e AWS_DYNAMODB_TABLE=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw dynamodb_table_name) -e AWS_S3_BUCKET=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw s3_bucket_name) -e AWS_S3_PREFIX=ssvd-report-store/prod -e AWS_SECRETS_ID=$(terraform -chdir=${{ env.TF_WORKING_DIR }} output -raw secrets_manager_secret_arn) -e PLAYWRIGHT_MODULE_URL=playwright ${IMAGE}",
              "docker image prune -af --filter until=72h || true"
            ]
          }
          JSON

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${{ steps.deploy.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy SSVD Report Store ${{ steps.deploy.outputs.image_tag }}" \
            --parameters file://ssm-deploy.json \
            --query 'Command.CommandId' \
            --output text)"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.deploy.outputs.instance_id }}"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.deploy.outputs.instance_id }}"

      - name: Deployment output
        run: echo "App URL: ${{ steps.deploy.outputs.app_url }}"
